name: Atividade 3 — Flutter UI + Estado (gate)

# Gate da Atividade 3 (Flutter): roda `flutter test` no PR do aluno.
# Usa `pull_request` (contexto do fork, sem secrets) — é seguro rodar o código
# do aluno aqui; NÃO posta comentário (sem token de escrita).
# ⚠️ AINDA NÃO VALIDADO COM PR REAL — fazer smoke-test (PR correto → verde / PR
#    com scaffold → vermelho) antes de confiar. Aluno edita o pratica/ in-place.
on:
  pull_request:
    paths:
      - "exercicios/03-flutter-ui-estado/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exercicios/03-flutter-ui-estado/pratica
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - name: flutter test (Ex1 + Ex2)
        run: flutter test --reporter expanded
